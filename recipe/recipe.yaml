schema_version: 1

context:
  version: "0.10.0"

package:
  name: gofumpt
  version: ${{ version }}

source:
  url: https://github.com/mvdan/gofumpt/archive/v${{ version }}.tar.gz
  sha256: 5f3158f665d1d49a19f3ed48981366c892b68904b2b34cb893c6fe3ff8346929

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - gofumpt --help

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - license-files/
  summary: Stricter gofmt
  homepage: https://github.com/mvdan/gofumpt
  repository: https://github.com/mvdan/gofumpt

extra:
  recipe-maintainers:
    - danielnachun
